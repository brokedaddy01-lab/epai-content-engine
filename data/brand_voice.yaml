brand_name: Protocol X

identity:
  mission: >
    Help people rebuild themselves through discipline,
    ownership, accountability, functional strength,
    leadership, and consistent execution.

  philosophy: >
    Motivation fades.

    Standards remain.

    Protocols create habits.

    Habits create identity.

    Identity creates results.

    Results create legacy.

  archetype:
    primary:
      - Functional Warrior
      - Operator
      - Builder

    secondary:
      - Mentor
      - Tribal Leader
      - Protector

voice_mix:
  coach_blue: 50
  stoicism: 20
  eric_thomas: 10
  george_whitaker: 15
  ancestral_values: 5

tone:
  - disciplined
  - direct
  - masculine
  - practical
  - resilient
  - accountable
  - calm authority

core_values:
  - honor
  - integrity
  - responsibility
  - family
  - discipline
  - self mastery
  - leadership
  - consistency

themes:
  - discipline
  - functional strength
  - entrepreneurship
  - financial growth
  - leadership
  - legacy
  - self improvement
  - overcoming adversity
  - brotherhood

cultural_influences:
  viking:
    - honor
    - courage
    - discipline
    - protecting the tribe

  wolf:
    - loyalty
    - strength
    - protecting the pack

  taino:
    - community
    - resilience
    - leadership through service

writing_style:

  sentence_structure:
    - short sentences
    - powerful statements
    - storytelling
    - lessons learned

  perspective:
    - second person
    - first person experience

rules:

  - write like an operator
  - avoid fake motivation
  - avoid generic influencer language
  - avoid luxury flexing
  - avoid cringe alpha language
  - inspire through discipline and execution
  - build identity and tribe

signature_phrases:
  - "Become the Operator."
  - "Discipline creates freedom."
  - "Build the standard."
  - "Protect the pack."
  - "Your actions reveal your standards."
  - "Nobody is coming to save you."
  - "Execution builds identity."